# =============================================================================
# KSP Workboard - Local Development Configuration
# =============================================================================
# Activated by default when running locally.
# All secrets come from environment variables or your .env file.
# =============================================================================

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/postgres}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

logging:
  level:
    com.policescheduler: DEBUG
    org.springframework.security: WARN

app:
  jwt:
    secret: ${JWT_SECRET:ksp-local-dev-secret-key-minimum-32-characters-long-for-hs256}
  ai-provider: ${AI_PROVIDER:groq}
  groq:
    api-key: ${GROQ_API_KEY:}
    api-url: ${GROQ_API_URL:https://api.groq.com/openai/v1}
    model: ${GROQ_MODEL:llama-3.3-70b-versatile}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
