# =============================================================================
# KSP Workboard - Production Configuration (AWS EC2)
# =============================================================================
# Activated with: --spring.profiles.active=prod
# All values come from environment variables in the systemd service file.
# =============================================================================

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 300000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        jdbc:
          batch_size: 20

logging:
  level:
    root: WARN
    com.policescheduler: INFO
    org.springframework.security: WARN
  file:
    name: /opt/ksp/logs/ksp-backend.log

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  # AI Provider: "bedrock" (recommended for prod) or "groq" (fallback)
  ai-provider: ${AI_PROVIDER:bedrock}
  groq:
    api-key: ${GROQ_API_KEY:}
    api-url: ${GROQ_API_URL:https://api.groq.com/openai/v1}
    model: ${GROQ_MODEL:llama-3.3-70b-versatile}
  bedrock:
    region: ${AWS_REGION:us-east-1}
    model-id: ${BEDROCK_MODEL_ID:amazon.nova-lite-v1:0}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}

# Tighter rate limits for production
chat:
  rate-limit:
    general: 30
    llm: 20
