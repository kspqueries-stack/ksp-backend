spring:
  application:
    name: ksp-workboard

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  ai-provider: ${AI_PROVIDER:groq}
  groq:
    api-key: ${GROQ_API_KEY:}
    api-url: ${GROQ_API_URL:https://api.groq.com/openai/v1}
    model: ${GROQ_MODEL:llama-3.3-70b-versatile}
  bedrock:
    region: ${AWS_REGION:us-east-1}
    model-id: ${BEDROCK_MODEL_ID:amazon.nova-lite-v1:0}
  s3:
    bucket: ${S3_REPORT_BUCKET:ksp-reports}
    region: ${AWS_REGION:us-east-1}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  email:
    enabled: ${EMAIL_ENABLED:true}

# Rate limiting for chat/AI endpoints
chat:
  rate-limit:
    general: ${CHAT_RATE_LIMIT_GENERAL:30}
    llm: ${CHAT_RATE_LIMIT_LLM:20}

# Legacy property mappings (used by chat services until they migrate to LlmClient)
groq:
  api:
    key: ${GROQ_API_KEY:}
    url: ${GROQ_API_URL:https://api.groq.com/openai/v1}/chat/completions
  stt:
    api:
      url: ${GROQ_API_URL:https://api.groq.com/openai/v1}/audio/transcriptions

embedding:
  api:
    key: ${GROQ_API_KEY:}
    url: ${GROQ_API_URL:https://api.groq.com/openai/v1}/embeddings
